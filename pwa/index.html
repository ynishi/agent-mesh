<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent-mesh</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e2e">
  <style>
    /* Catppuccin Mocha palette */
    :root {
      --crust:    #11111b;
      --mantle:   #181825;
      --base:     #1e1e2e;
      --surface0: #313244;
      --surface1: #45475a;
      --surface2: #585b70;
      --overlay0: #6c7086;
      --overlay1: #7f849c;
      --subtext0: #a6adc8;
      --subtext1: #bac2de;
      --text:     #cdd6f4;
      --lavender: #b4befe;
      --blue:     #89b4fa;
      --sapphire: #74c7ec;
      --sky:      #89dceb;
      --teal:     #94e2d5;
      --green:    #a6e3a1;
      --yellow:   #f9e2af;
      --peach:    #fab387;
      --maroon:   #eba0ac;
      --red:      #f38ba8;
      --mauve:    #cba6f7;
      --pink:     #f5c2e7;
      --flamingo: #f2cdcd;
      --rosewater:#f5e0dc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--base);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--mantle);
      padding: 1rem;
      text-align: center;
      border-bottom: 1px solid var(--surface0);
    }
    header h1 { font-size: 1.2rem; color: var(--mauve); }
    header p { font-size: 0.8rem; color: var(--overlay1); margin-top: 0.25rem; }
    main { flex: 1; padding: 1rem; max-width: 600px; margin: 0 auto; width: 100%; }

    .section { margin-bottom: 1.5rem; }
    .section h2 { font-size: 0.9rem; color: var(--mauve); margin-bottom: 0.5rem; }

    label { display: block; font-size: 0.8rem; color: var(--subtext0); margin-bottom: 0.25rem; }
    input, textarea {
      width: 100%;
      padding: 0.5rem;
      background: var(--surface0);
      border: 1px solid var(--surface1);
      color: var(--text);
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--lavender); }
    textarea { min-height: 80px; resize: vertical; }
    button {
      padding: 0.5rem 1rem;
      background: var(--mauve);
      color: var(--crust);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      transition: background 0.15s;
    }
    button:hover { background: var(--lavender); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary { background: var(--surface1); color: var(--text); }
    button.secondary:hover { background: var(--surface2); }

    #status {
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-bottom: 1rem;
    }
    .status-disconnected { background: var(--surface0); color: var(--red); }
    .status-connecting { background: var(--surface0); color: var(--yellow); }
    .status-connected { background: var(--surface0); color: var(--green); }

    #log {
      background: var(--crust);
      padding: 0.75rem;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.75rem;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-info { color: var(--green); }
    .log-error { color: var(--red); }
    .log-send { color: var(--blue); }
    .log-recv { color: var(--yellow); }

    .user-code {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--peach);
      text-align: center;
      padding: 0.75rem;
      background: var(--surface0);
      border-radius: 6px;
      letter-spacing: 0.3rem;
      margin: 0.5rem 0;
    }
    .hidden { display: none; }
    .step-label {
      font-size: 0.75rem;
      color: var(--overlay1);
      margin-bottom: 0.25rem;
    }
    a { color: var(--sapphire); }
    a:hover { color: var(--sky); }
    .agent-card {
      background: var(--surface0);
      border: 1px solid var(--surface1);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.4rem;
      cursor: pointer;
      font-size: 0.8rem;
      transition: border-color 0.15s, background 0.15s;
    }
    .agent-card:hover { border-color: var(--mauve); background: var(--surface1); }
    .agent-card .agent-name { color: var(--pink); font-weight: bold; }
    .agent-card .agent-caps { color: var(--overlay0); font-size: 0.7rem; }
    .agent-card .agent-aid { color: var(--blue); font-family: monospace; font-size: 0.7rem; }
    .agent-card.self { opacity: 0.5; cursor: default; }
    .agent-card.self:hover { border-color: var(--surface1); background: var(--surface0); }
  </style>
</head>
<body>
  <header>
    <h1>agent-mesh</h1>
    <p>Private mesh network for AI agents</p>
  </header>

  <main>
    <div id="status" class="status-disconnected">Not logged in</div>

    <!-- Step 1: Login -->
    <div id="login-section" class="section">
      <h2>Login</h2>
      <label for="cp-url">Server URL (blank = same origin)</label>
      <input id="cp-url" value="" placeholder="https://agent-mesh.fly.dev">
      <button id="btn-login" onclick="doLogin()">Login with GitHub</button>
      <button class="secondary" onclick="toggleManual()">Use Secret Key</button>

      <!-- Device Flow UI (shown during login) -->
      <div id="device-flow" class="hidden">
        <p class="step-label">Open the link and enter the code:</p>
        <div class="user-code" id="user-code"></div>
        <p style="text-align:center; margin: 0.5rem 0;">
          <a id="verify-link" href="#" target="_blank">Open GitHub</a>
        </p>
        <p class="step-label" id="poll-status">Waiting for authorization...</p>
      </div>

      <!-- Manual key input (toggled) -->
      <div id="manual-section" class="hidden">
        <label for="relay-url">Relay URL (blank = same origin)</label>
        <input id="relay-url" value="" placeholder="wss://agent-mesh.fly.dev/relay/ws">
        <label for="secret-key">Secret Key (hex)</label>
        <input id="secret-key" placeholder="64 hex chars from ~/.mesh/config.toml">
        <button onclick="doManualConnect()">Connect</button>
      </div>
    </div>

    <!-- Step 2: Agent (shown after login) -->
    <div id="agent-section" class="section hidden">
      <h2>Agent</h2>
      <label>Agent ID</label>
      <input id="agent-id" readonly placeholder="(not connected)">
      <label>Secret Key (save this!)</label>
      <div style="display:flex; gap:0.25rem; align-items:center;">
        <input id="agent-secret" type="password" readonly style="flex:1;">
        <button class="secondary" onclick="copySecret()" style="margin:0; white-space:nowrap;">Copy</button>
      </div>
    </div>

    <!-- Step 3: Agents list -->
    <div id="agents-section" class="section hidden">
      <h2>Agents <button class="secondary" onclick="loadAgents()" style="font-size:0.75rem; padding:0.2rem 0.5rem;">Refresh</button></h2>
      <div id="agents-list" style="max-height:200px; overflow-y:auto;"></div>
    </div>

    <!-- Step 4: Send Request -->
    <div id="request-section" class="section hidden">
      <h2>Send Request</h2>
      <label for="target-id">Target Agent ID</label>
      <input id="target-id" placeholder="base64url-encoded Ed25519 public key">
      <label for="payload">Payload (JSON)</label>
      <textarea id="payload">{"capability": "echo", "message": "hello from PWA"}</textarea>
      <button id="btn-send" onclick="doRequest()">Send Request</button>
    </div>

    <div class="section">
      <h2>Log</h2>
      <div id="log"></div>
    </div>
  </main>

  <script type="module">
    import init, { MeshClient } from './pkg/agent_mesh_wasm.js';

    let client = null;
    let apiToken = null;
    let wasmReady = false;

    window.log = function(msg, cls = 'log-info') {
      const el = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      el.innerHTML += `<span class="${cls}">[${time}] ${msg}</span>\n`;
      el.scrollTop = el.scrollHeight;
    };

    window.copySecret = function() {
      const el = document.getElementById('agent-secret');
      navigator.clipboard.writeText(el.value).then(
        () => log('Secret key copied to clipboard'),
        () => log('Failed to copy', 'log-error')
      );
    };

    function setStatus(text, cls) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = cls;
    }

    function cpUrl() {
      const val = document.getElementById('cp-url').value.trim();
      return (val || location.origin).replace(/\/+$/, '');
    }

    function relayUrlFromCp(cp) {
      return cp.replace(/^http/, 'ws') + '/relay/ws';
    }

    // -- Hex helpers --
    function hexEncode(bytes) {
      return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // -- Ed25519 key generation (via WASM / Web Crypto is not Ed25519) --
    // We generate 32 random bytes as the secret key.
    // Ed25519 derivation happens inside the WASM module.
    function generateSecretKey() {
      const bytes = new Uint8Array(32);
      crypto.getRandomValues(bytes);
      return hexEncode(bytes);
    }

    // Derive agent_id from secret key using WASM.
    // We connect briefly just to get the agent_id... but actually
    // we can derive it by creating a MeshClient. Instead, we'll
    // use a simpler approach: register with CP, then connect.
    // The agent_id is returned by the register API.

    // -- Toggle manual key input --
    window.toggleManual = function() {
      document.getElementById('manual-section').classList.toggle('hidden');
      document.getElementById('device-flow').classList.add('hidden');
    };

    // -- Device Flow Login --
    window.doLogin = async function() {
      const cp = cpUrl();
      const btnLogin = document.getElementById('btn-login');
      btnLogin.disabled = true;

      try {
        log('Starting GitHub Device Flow...');

        // 1. Start device flow
        const deviceResp = await fetch(`${cp}/oauth/device`, { method: 'POST' });
        if (!deviceResp.ok) {
          const text = await deviceResp.text();
          throw new Error(`Device flow failed: ${deviceResp.status} ${text}`);
        }
        const device = await deviceResp.json();

        // 2. Show user code + verification URL
        document.getElementById('device-flow').classList.remove('hidden');
        document.getElementById('user-code').textContent = device.user_code;
        const verifyLink = document.getElementById('verify-link');
        verifyLink.href = device.verification_uri;
        verifyLink.textContent = device.verification_uri;

        log(`Code: ${device.user_code} — click the link to open GitHub`);

        // 3. Poll for token
        const interval = (device.interval || 5) * 1000;
        const deadline = Date.now() + (device.expires_in || 300) * 1000;

        while (Date.now() < deadline) {
          await new Promise(r => setTimeout(r, interval));

          const tokenResp = await fetch(`${cp}/oauth/token`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ device_code: device.device_code }),
          });
          const tokenData = await tokenResp.json();

          if (tokenData.error) {
            if (tokenData.error === 'authorization_pending' || tokenData.error === 'slow_down') {
              document.getElementById('poll-status').textContent = 'Waiting for authorization...';
              continue;
            }
            throw new Error(`OAuth error: ${tokenData.error}`);
          }

          if (tokenData.api_token) {
            apiToken = tokenData.api_token;
            log('Login successful!');
            document.getElementById('device-flow').classList.add('hidden');

            // 4. Auto-register agent + connect to relay
            await autoRegisterAndConnect(cp);
            return;
          }
        }
        throw new Error('Login timed out');

      } catch (e) {
        log(`Error: ${e.message || e}`, 'log-error');
        setStatus('Login failed', 'status-disconnected');
      } finally {
        btnLogin.disabled = false;
      }
    };

    // -- Auto register + connect --
    async function autoRegisterAndConnect(cp) {
      try {
        setStatus('Registering agent...', 'status-connecting');

        // Generate Ed25519 keypair (secret key)
        const secretKeyHex = generateSecretKey();

        // We need the agent_id to register. Initialize WASM and derive it.
        if (!wasmReady) { await init(); wasmReady = true; }

        // Temporarily connect to derive agent_id — but we can't connect
        // without being registered. So we need to derive agent_id from
        // the secret key without connecting.
        // Use the WASM MeshClient's internal keygen... but it requires relay.
        // Instead: create a temporary internal derivation.
        // Actually, we'll add a static method to MeshClient for this.

        // For now: use the MeshClientWithKey approach — generate and
        // compute agent_id client-side by using nacl or tweetnacl.
        // Since we already have WASM with Ed25519, let's export a helper.

        const agentId = MeshClient.deriveAgentId(secretKeyHex);

        log(`Generated agent: ${agentId.substring(0, 16)}...`);

        // Register with CP
        const regResp = await fetch(`${cp}/agents`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiToken}`,
          },
          body: JSON.stringify({
            agent_id: agentId,
            name: 'pwa-agent',
            capabilities: [{ name: 'chat' }],
          }),
        });
        if (!regResp.ok) {
          const text = await regResp.text();
          throw new Error(`Register failed: ${regResp.status} ${text}`);
        }
        const card = await regResp.json();
        log(`Registered: ${card.name} (${card.id})`);

        // Connect to relay
        const relayUrl = relayUrlFromCp(cp);
        log(`Connecting to ${relayUrl}...`);
        setStatus('Connecting to relay...', 'status-connecting');

        client = await MeshClient.connect(secretKeyHex, relayUrl);
        const confirmedId = client.agentId();

        document.getElementById('agent-id').value = confirmedId;
        document.getElementById('agent-secret').value = secretKeyHex;
        document.getElementById('agent-section').classList.remove('hidden');
        document.getElementById('agents-section').classList.remove('hidden');
        document.getElementById('request-section').classList.remove('hidden');
        document.getElementById('login-section').classList.add('hidden');
        setStatus(`Connected as ${confirmedId.substring(0, 12)}...`, 'status-connected');
        log(`Connected! Agent ID: ${confirmedId}`);

        loadAgents();

      } catch (e) {
        log(`Error: ${e.message || e}`, 'log-error');
        setStatus('Registration failed', 'status-disconnected');
      }
    }

    // -- Manual connect (existing flow) --
    window.doManualConnect = async function() {
      try {
        if (!wasmReady) { await init(); wasmReady = true; }
        const relayVal = document.getElementById('relay-url').value.trim();
        const relayUrl = relayVal || relayUrlFromCp(location.origin);
        const secretKey = document.getElementById('secret-key').value.trim();

        if (!secretKey) {
          log('Secret key is required.', 'log-error');
          return;
        }

        setStatus('Connecting...', 'status-connecting');
        log(`Connecting to ${relayUrl}...`);

        client = await MeshClient.connect(secretKey, relayUrl);
        const agentId = client.agentId();
        document.getElementById('agent-id').value = agentId;
        document.getElementById('agent-secret').value = secretKey;
        document.getElementById('agent-section').classList.remove('hidden');
        document.getElementById('request-section').classList.remove('hidden');
        document.getElementById('login-section').classList.add('hidden');
        setStatus(`Connected as ${agentId.substring(0, 12)}...`, 'status-connected');
        log(`Authenticated. Agent ID: ${agentId}`);
      } catch (e) {
        setStatus('Connection failed', 'status-disconnected');
        log(`Error: ${e.message || e}`, 'log-error');
      }
    };

    // -- Load agents list --
    window.loadAgents = async function() {
      if (!apiToken) { log('Not logged in (no API token)', 'log-error'); return; }
      try {
        const cp = cpUrl();
        const resp = await fetch(`${cp}/agents`, {
          headers: { 'Authorization': `Bearer ${apiToken}` },
        });
        if (!resp.ok) {
          const text = await resp.text();
          log(`Failed to list agents: ${resp.status} ${text}`, 'log-error');
          return;
        }
        const agents = await resp.json();
        const myAgentId = client ? client.agentId() : '';
        const container = document.getElementById('agents-list');
        if (agents.length === 0) {
          container.innerHTML = '<p style="color:var(--overlay1); font-size:0.8rem;">No agents found in your group.</p>';
          return;
        }
        container.innerHTML = agents.map(a => {
          const isSelf = a.agent_id === myAgentId;
          const caps = (a.capabilities || []).map(c => c.name).join(', ') || 'none';
          const desc = a.description ? ` — ${a.description}` : '';
          return `<div class="agent-card${isSelf ? ' self' : ''}" ${isSelf ? '' : `onclick="selectAgent('${a.agent_id}')"`}>
            <span class="agent-name">${a.name}</span>${desc}${isSelf ? ' <span style="color:var(--overlay1);">(you)</span>' : ''}
            <div class="agent-aid">${a.agent_id}</div>
            <div class="agent-caps">${caps}</div>
          </div>`;
        }).join('');
        log(`Loaded ${agents.length} agent(s)`);
      } catch (e) {
        log(`Error listing agents: ${e.message || e}`, 'log-error');
      }
    };

    window.selectAgent = function(agentId) {
      document.getElementById('target-id').value = agentId;
      log(`Selected target: ${agentId.substring(0, 16)}...`);
    };

    // -- Send Request --
    window.doRequest = async function() {
      if (!client) { log('Not connected', 'log-error'); return; }
      try {
        const targetId = document.getElementById('target-id').value.trim();
        const payload = document.getElementById('payload').value.trim();

        if (!targetId) { log('Target Agent ID is required', 'log-error'); return; }

        log(`\u2192 Sending to ${targetId.substring(0, 12)}...`, 'log-send');
        log(`  Payload: ${payload}`, 'log-send');

        const response = await client.request(targetId, payload);
        log(`\u2190 Response: ${response}`, 'log-recv');
      } catch (e) {
        log(`Error: ${e.message || e}`, 'log-error');
      }
    };

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
