# fly.toml app configuration file generated for agent-mesh on 2026-04-04T12:01:41+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agent-mesh'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  RUST_LOG = 'info'

[[mounts]]
  source = 'mesh_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 8080

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.ports]]
    port = 80
    handlers = ['http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

  [[services.http_checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '10s'
    method = 'get'
    path = '/health'
    protocol = 'http'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
